<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Munkabeosztás</title>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/calendar.css">
</head>
<body>

<main class="schedule-page">

    <header class="schedule-header">
        <div class="schedule-header-row">
            <div class="schedule-header-left">
                <a class="month-button"
                   th:href="@{/manage(year=${year}, month=${month})}">
                    Dolgozók kezelése
                </a>

                <div class="theme-switch-wrapper">
                    <span class="theme-switch-label">Színes nézet</span>

                    <button type="button"
                            class="theme-toggle-button"
                            id="themeToggleButton"
                            aria-label="Színes nézet kapcsoló"
                            aria-pressed="false">
                        <span class="theme-toggle-knob"></span>
                    </button>
                </div>
            </div>

            <div class="schedule-header-center">
                <a class="month-button compact-month-button"
                   th:href="@{/(year=${previousYear}, month=${previousMonth})}">
                    ← Előző hónap
                </a>

                <div class="month-picker"
                     th:attr="data-current-year=${year}, data-current-month=${month}">
                    <button type="button"
                            class="month-title-button"
                            id="monthPickerButton"
                            th:text="${year + ' ' + monthName + ' ▼'}">
                        2026 Július ▼
                    </button>

                    <div class="month-picker-dropdown" id="monthPickerDropdown">
                        <div class="month-picker-year-row">
                            <button type="button" id="pickerPreviousYear">←</button>
                            <span id="pickerYear" th:text="${year}">2026</span>
                            <button type="button" id="pickerNextYear">→</button>
                        </div>

                        <div class="month-picker-grid">
                            <button type="button" data-month="1">Január</button>
                            <button type="button" data-month="2">Február</button>
                            <button type="button" data-month="3">Március</button>
                            <button type="button" data-month="4">Április</button>
                            <button type="button" data-month="5">Május</button>
                            <button type="button" data-month="6">Június</button>
                            <button type="button" data-month="7">Július</button>
                            <button type="button" data-month="8">Augusztus</button>
                            <button type="button" data-month="9">Szeptember</button>
                            <button type="button" data-month="10">Október</button>
                            <button type="button" data-month="11">November</button>
                            <button type="button" data-month="12">December</button>
                        </div>
                    </div>
                </div>

                <a class="month-button compact-month-button"
                   th:href="@{/(year=${nextYear}, month=${nextMonth})}">
                    Következő hónap →
                </a>
            </div>

            <div class="schedule-header-right"></div>
        </div>
    </header>

    <section class="schedule-table-panel">

        <div class="summary-column-toolbar">
            <span class="summary-column-toolbar-label">Elrejtett oszlopok:</span>

            <button type="button" class="summary-column-restore-button" data-left-restore="name">
                Név
            </button>

            <button type="button" class="summary-column-restore-button" data-left-restore="skills">
                Skillek
            </button>

            <button type="button" class="summary-column-restore-button" data-left-restore="vacation">
                Szabi
            </button>

            <button type="button" class="summary-column-restore-button" data-summary-restore="total">
                Össz
            </button>

            <button type="button" class="summary-column-restore-button" data-summary-restore="count">
                Mű
            </button>

            <button type="button" class="summary-column-restore-button" data-summary-restore="night">
                Éj
            </button>

            <button type="button" class="summary-column-restore-button" data-summary-restore="standby">
                Kész
            </button>

            <button type="button" class="summary-column-restore-button" data-summary-restore="ho">
                HO
            </button>
        </div>

        <div class="schedule-table-wrapper">
            <table class="schedule-table">
                <thead>
                <tr>
                    <th class="sticky-column employee-name-column"
                        rowspan="2"
                        data-left-column="name">
                        <div class="summary-header-content">
                            <span>Név</span>
                            <button type="button" class="summary-column-hide-button" data-left-hide="name">−</button>
                        </div>
                    </th>

                    <th class="sticky-column employee-skills-column"
                        rowspan="2"
                        data-left-column="skills">
                        <div class="summary-header-content">
                            <span>Skillek</span>
                            <button type="button" class="summary-column-hide-button" data-left-hide="skills">−</button>
                        </div>
                    </th>

                    <th class="sticky-column vacation-column"
                        rowspan="2"
                        data-left-column="vacation">
                        <div class="summary-header-content">
                            <span>Szabi</span>
                            <button type="button" class="summary-column-hide-button" data-left-hide="vacation">−</button>
                        </div>
                    </th>

                    <th th:each="day : ${scheduleDays}"
                        class="day-header"
                        th:classappend="${(!day.currentMonth ? ' other-month' : '') + (day.weekend ? ' weekend' : '') + (day.today ? ' today-column' : '') + (day.holiday ? ' holiday-column' : '')}"
                        th:title="${day.holiday ? day.holidayName : ''}">

                        <button type="button"
                                class="day-header-button"
                                th:attr="data-date=${day.date}">
                            <span th:text="${day.dayNameShort}">h</span>
                        </button>

                        <div class="day-holiday-dropdown">
                            <button type="button"
                                    class="day-holiday-toggle-button"
                                    th:attr="data-date=${day.date}"
                                    th:text="${day.holiday ? 'Piros betű levétele' : 'Piros betűs nap'}">
                                Piros betűs nap
                            </button>
                        </div>
                    </th>

                    <th class="summary-header summary-total-column"
                        rowspan="2"
                        data-summary-column="total">
                        <div class="summary-header-content">
                            <span>Össz</span>
                            <button type="button" class="summary-column-hide-button" data-summary-hide="total">−</button>
                        </div>
                    </th>

                    <th class="summary-header summary-count-column"
                        rowspan="2"
                        data-summary-column="count">
                        <div class="summary-header-content">
                            <span>Mű</span>
                            <button type="button" class="summary-column-hide-button" data-summary-hide="count">−</button>
                        </div>
                    </th>

                    <th class="summary-header summary-night-column"
                        rowspan="2"
                        data-summary-column="night">
                        <div class="summary-header-content">
                            <span>Éj</span>
                            <button type="button" class="summary-column-hide-button" data-summary-hide="night">−</button>
                        </div>
                    </th>

                    <th class="summary-header summary-standby-column"
                        rowspan="2"
                        data-summary-column="standby">
                        <div class="summary-header-content">
                            <span>Kész</span>
                            <button type="button" class="summary-column-hide-button" data-summary-hide="standby">−</button>
                        </div>
                    </th>

                    <th class="summary-header summary-ho-column"
                        rowspan="2"
                        data-summary-column="ho">
                        <div class="summary-header-content">
                            <span>HO</span>
                            <button type="button" class="summary-column-hide-button" data-summary-hide="ho">−</button>
                        </div>
                    </th>
                </tr>

                <tr>
                    <th th:each="day : ${scheduleDays}"
                        class="day-number-header"
                        th:classappend="${(!day.currentMonth ? ' other-month' : '') + (day.weekend ? ' weekend' : '') + (day.today ? ' today-column' : '') + (day.holiday ? ' holiday-column' : '')}"
                        th:title="${day.holiday ? day.holidayName : ''}">
                        <span th:text="${day.dayNumber}">1</span>
                    </th>
                </tr>
                </thead>

                <tbody>
                <th:block th:each="employee : ${employees}">

                    <tr class="employee-main-row"
                        th:attr="data-vacation-hours=${employee.vacationHours}, data-row-employee-id=${employee.id}">

                        <td class="sticky-column employee-name-column employee-name-cell"
                            rowspan="2"
                            data-left-column="name"
                            th:text="${employee.name}">
                            Béla
                        </td>

                        <td class="sticky-column employee-skills-column employee-skills-cell"
                            rowspan="2"
                            data-left-column="skills"
                            th:text="${employee.skillsDisplayText}">
                            A/B
                        </td>

                        <td class="sticky-column vacation-column vacation-cell"
                            rowspan="2"
                            data-left-column="vacation"
                            th:text="${employee.vacationHours}">
                            144
                        </td>

                        <td th:each="day : ${scheduleDays}"
                            class="schedule-cell assignment-cell"
                            th:classappend="${(!day.currentMonth ? ' other-month' : '') + (day.weekend ? ' weekend' : '') + (day.today ? ' today-column' : '') + (day.holiday ? ' holiday-column' : '')}"
                            th:attr="data-employee-id=${employee.id}, data-date=${day.date}, data-current-month=${day.currentMonth}, data-assignment-layer='NORMAL'">

                            <button type="button" class="schedule-cell-display">
                                -
                            </button>

                            <div class="shift-picker">
                                <button type="button"
                                        class="shift-picker-option clear-option"
                                        data-clear="true">
                                    Üres
                                </button>

                                <button type="button"
                                        class="shift-picker-option"
                                        th:each="shiftType : ${shiftTypes}"
                                        th:attr="
                                            data-shift-id=${shiftType.id},
                                            data-code=${shiftType.code},
                                            data-hours=${shiftType.hours},
                                            data-night=${shiftType.night},
                                            data-standby=${shiftType.standby},
                                            data-home-office=${shiftType.homeOffice},
                                            data-description=${shiftType.description}
                                        "
                                        th:text="${
                                            #strings.equals(shiftType.code, 'SZ')
                                                ? 'SZ - Szabadság'
                                                : (
                                                    #strings.equals(shiftType.code, '-')
                                                        ? '- - Nem szeretne dolgozni'
                                                        : shiftType.code + ' - ' + shiftType.hours + ' óra'
                                                )
                                        }">
                                    A - 12 óra
                                </button>
                            </div>
                        </td>

                        <td class="summary-cell row-total-hours"
                            rowspan="2"
                            data-summary-column="total">
                            0
                        </td>

                        <td class="summary-cell row-shift-count"
                            rowspan="2"
                            data-summary-column="count">
                            0
                        </td>

                        <td class="summary-cell row-night-hours"
                            rowspan="2"
                            data-summary-column="night">
                            0
                        </td>

                        <td class="summary-cell row-standby-hours"
                            rowspan="2"
                            data-summary-column="standby">
                            0
                        </td>

                        <td class="summary-cell row-ho-hours"
                            rowspan="2"
                            data-summary-column="ho">
                            0%
                        </td>
                    </tr>

                    <tr class="employee-standby-row"
                        th:attr="data-row-employee-id=${employee.id}">

                        <td th:each="day : ${scheduleDays}"
                            class="standby-placeholder-cell assignment-cell"
                            th:classappend="${(!day.currentMonth ? ' other-month' : '') + (day.weekend ? ' weekend' : '') + (day.today ? ' today-column' : '') + (day.holiday ? ' holiday-column' : '')}"
                            th:attr="data-employee-id=${employee.id}, data-date=${day.date}, data-current-month=${day.currentMonth}, data-assignment-layer='STANDBY'">

                            <button type="button" class="schedule-cell-display standby-cell-display">
                                -
                            </button>

                            <div class="shift-picker">
                                <button type="button"
                                        class="shift-picker-option clear-option"
                                        data-clear="true">
                                    Üres
                                </button>

                                <button type="button"
                                        class="shift-picker-option"
                                        th:each="shiftType : ${shiftTypes}"
                                        th:attr="
                                            data-shift-id=${shiftType.id},
                                            data-code=${shiftType.code},
                                            data-hours=${shiftType.hours},
                                            data-night=${shiftType.night},
                                            data-standby=${shiftType.standby},
                                            data-home-office=${shiftType.homeOffice},
                                            data-description=${shiftType.description}
                                        "
                                        th:text="${
                                            #strings.equals(shiftType.code, 'SZ')
                                                ? 'SZ - Szabadság'
                                                : (
                                                    #strings.equals(shiftType.code, '-')
                                                        ? '- - Nem szeretne dolgozni'
                                                        : shiftType.code + ' - ' + shiftType.hours + ' óra'
                                                )
                                        }">
                                    A - 12 óra
                                </button>
                            </div>
                        </td>
                    </tr>

                </th:block>
                </tbody>
            </table>
        </div>
    </section>

</main>

<script src="/theme.js"></script>
<script src="/calendar.js"></script>
</body>
</html>
