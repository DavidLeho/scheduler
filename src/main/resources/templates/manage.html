<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dolgozók kezelése</title>
  <link rel="stylesheet" href="/base.css">
  <link rel="stylesheet" href="/manage.css">
</head>
<body class="manage-page">

<header class="manage-header">
  <a class="month-button"
     th:href="@{/(year=${year}, month=${month})}">
    ← Vissza a naptárhoz
  </a>

  <a class="month-button" href="/export/excel">
    Excel export
  </a>

  <h1>Dolgozók kezelése</h1>
</header>

<div class="message-area">
  <div class="message success-message" th:if="${successMessage}" th:text="${successMessage}">
    Sikeres művelet.
  </div>

  <div class="message error-message" th:if="${errorMessage}" th:text="${errorMessage}">
    Hiba történt.
  </div>
</div>

<main class="manage-grid">

  <section class="manage-card manage-shifts-card">
    <h2>Beosztások</h2>

    <form class="shift-type-form" action="/shift-types" method="post">
      <input type="hidden" name="year" th:value="${year}">
      <input type="hidden" name="month" th:value="${month}">

      <label>
        Új műszak kód:
        <input type="text" name="code" maxlength="10" required>
      </label>

      <label>
        Óraszám:
        <input type="number" name="hours" min="0" step="0.5" value="8" required>
      </label>

      <label>
        Leírás:
        <input type="text" name="description" placeholder="pl. 12 órás nappali">
      </label>

      <div class="shift-type-checkboxes">
        <label>
          <input type="checkbox" name="night">
          Éjszakai
        </label>

        <label>
          <input type="checkbox" name="standby">
          Készenlét
        </label>

        <label>
          <input type="checkbox" name="homeOffice">
          HO
        </label>
      </div>

      <button type="submit">Műszak hozzáadása</button>
    </form>

    <div class="shift-type-badge-list">
      <div class="shift-type-badge" th:each="shiftType : ${shiftTypes}">
        <span th:text="${shiftType.code}">A</span>

        <form action="/shift-types/delete"
              method="post"
              onsubmit="return confirm('Biztosan törlöd ezt a műszakot?');">
          <input type="hidden" name="id" th:value="${shiftType.id}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <button class="small-delete-button" type="submit">×</button>
        </form>
      </div>
    </div>

    <div class="shift-type-details-section">
      <h3>Műszak részletek</h3>

      <div class="shift-type-details-list">
        <form class="shift-type-details-row"
              th:each="shiftType : ${shiftTypes}"
              action="/shift-types/update"
              method="post">

          <input type="hidden" name="id" th:value="${shiftType.id}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <input class="shift-code-input"
                 type="text"
                 name="code"
                 maxlength="10"
                 th:value="${shiftType.code}"
                 required>

          <input class="shift-hours-input"
                 type="number"
                 name="hours"
                 min="0"
                 step="0.5"
                 th:value="${shiftType.hours}"
                 required>

          <span>óra</span>

          <label>
            <input type="checkbox"
                   name="night"
                   th:checked="${shiftType.night}">
            éj
          </label>

          <label>
            <input type="checkbox"
                   name="standby"
                   th:checked="${shiftType.standby}">
            készenlét
          </label>

          <label>
            <input type="checkbox"
                   name="homeOffice"
                   th:checked="${shiftType.homeOffice}">
            HO
          </label>

          <input class="shift-description-input"
                 type="text"
                 name="description"
                 th:value="${shiftType.description}"
                 placeholder="Leírás">

          <button type="submit">Mentés</button>
        </form>
      </div>
    </div>
  </section>

  <section class="manage-card manage-skills-card">
    <h2>Skillek</h2>

    <form class="skill-form" action="/skills" method="post">
      <input type="hidden" name="year" th:value="${year}">
      <input type="hidden" name="month" th:value="${month}">

      <label>
        Új skill:
        <input type="text" name="skillName" required>
      </label>

      <label>
        Leírás:
        <input type="text" name="skillDescription" placeholder="pl. entry fragger">
      </label>

      <button type="submit">Skill hozzáadása</button>
    </form>

    <div class="manage-skill-list">
      <div class="skill-item" th:each="skill : ${skills}">
        <span th:text="${skill}">A</span>

        <form action="/skills/delete"
              method="post"
              onsubmit="return confirm('Biztosan törlöd ezt a skillt? A dolgozókból és a meglévő beosztásokból is eltűnik.');">
          <input type="hidden" name="skillName" th:value="${skill}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <button class="small-delete-button" type="submit">×</button>
        </form>
      </div>
    </div>

    <div class="skill-description-section">
      <h3>Skill leírások</h3>

      <div class="skill-description-list">
        <form class="skill-description-row"
              th:each="skill : ${skillObjects}"
              action="/skills/description"
              method="post">

          <input type="hidden" name="id" th:value="${skill.id}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <div class="skill-description-name" th:text="${skill.name}">A</div>

          <input type="text"
                 name="skillDescription"
                 th:value="${skill.description}"
                 placeholder="Nincs leírás">

          <button type="submit">Mentés</button>
        </form>
      </div>
    </div>
  </section>

  <section class="manage-card manage-new-employee-card">
    <h2>Új dolgozó</h2>

    <form class="employee-form" action="/employees" method="post">
      <input type="hidden" name="year" th:value="${year}">
      <input type="hidden" name="month" th:value="${month}">

      <label>
        Név:
        <input type="text" name="name" required>
      </label>

      <label>
        Szabadság órában:
        <input type="number" name="vacationHours" min="0" value="0" required>
      </label>

      <div>
        <strong>Skillek:</strong>

        <div class="skill-checkboxes">
          <label th:each="skill : ${skills}">
            <input type="checkbox" name="selectedSkills" th:value="${skill}">
            <span th:text="${skill}">A</span>
          </label>
        </div>
      </div>

      <button type="submit">Dolgozó hozzáadása</button>
    </form>
  </section>

  <section class="manage-card manage-employees-card">
    <h2>Dolgozók</h2>

    <div class="manage-employee-list">
      <div class="employee-card" th:each="employee : ${employees}">

        <form class="employee-form" action="/employees/update" method="post">
          <input type="hidden" name="id" th:value="${employee.id}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <label>
            Név:
            <input type="text" name="name" th:value="${employee.name}" required>
          </label>

          <label>
            Szabadság órában:
            <input type="number"
                   name="vacationHours"
                   min="0"
                   th:value="${employee.vacationHours}"
                   required>
          </label>

          <div>
            <strong>Skillek:</strong>

            <div class="skill-checkboxes">
              <label th:each="skill : ${skills}">
                <input type="checkbox"
                       name="selectedSkills"
                       th:value="${skill}"
                       th:checked="${employee.skills.contains(skill)}">
                <span th:text="${skill}">A</span>
              </label>
            </div>
          </div>

          <button type="submit">Módosítás mentése</button>
        </form>

        <form action="/employees/delete"
              method="post"
              onsubmit="return confirm('Biztosan törlöd ezt a dolgozót? A hozzá tartozó beosztások is törlődnek.');">
          <input type="hidden" name="id" th:value="${employee.id}">
          <input type="hidden" name="year" th:value="${year}">
          <input type="hidden" name="month" th:value="${month}">

          <button type="submit">Dolgozó törlése</button>
        </form>

      </div>
    </div>
  </section>

</main>

</body>
</html>
